<style>

<body>

  <video autoplay playsinline></video>
</div>

<div id="errorMsg"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  shaka.polyfill.installAll();
  if(!shaka.Player.isBrowserSupported()){ showError("Browser not supported"); return; }

  const tvgId = new URLSearchParams(location.search).get("tvid");
  if(!tvgId){ showError("Use ?tvid=ss1hd"); return; }

  const COOKIE="__hdnea__=st=1772937957~exp=1773024357~acl=/*~hmac=d43c7771d4054af99c2353d4119214b32c022e716dd521e998090e86f694f134";

  const channels = {
    "ss1hd": {name:"Star Sports 1 HD", url:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/output/index.mpd", keyId:"965dc2ddb1d85138ad787999a7f30ca5", key:"859695076e67fe961836b564db6d689c"},
    "ss1sd": {name:"Star Sports 1", url:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_1_BTS/output/index.mpd", keyId:"df20894ec30954d3b28097c138f4cfda", key:"ff9b6292b1cddbd11a046029cb314634"},
    "ss1hinhd": {name:"Star Sports 1 Hindi HD", url:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd", keyId:"400131994b445d8c8817202248760fda", key:"2d56cb6f07a75b9aff165d534ae2bfc4"},
    "ss1hinsd": {name:"Star Sports 1 Hindi", url:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd", keyId:"8ea9b607549252068e260a5f4d7dd321", key:"350c0aaffedf51cc1502e9543c7c885e"},
    "ss2hd": {name:"Star Sports 2 HD", url:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD2_BTS/output/index.mpd", keyId:"9457eb90129456fa8ea95e10ba4ac51e", key:"e620a970cea474c491ac78ae71a4d764"},
    "ss2sd": {name:"Star Sports 2", url:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_2_BTS/output/index.mpd", keyId:"fc3aafe80845584199a637249fad2ffa", key:"ca4474972fdb4bf8ecb164482853c692"}
  };

  if(!channels[tvgId]){ showError("Channel not found"); return; }
  const ch = channels[tvgId];

  document.title = ch.name;
  const video = document.querySelector("video");
  const player = new shaka.Player(video);

  player.configure({drm:{clearKeys:{[ch.keyId]: ch.key}}});

  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers["Referer"]="https://www.jiotv.com/";
    request.headers["User-Agent"]="plaYtv/7.1.3";
    request.headers["Cookie"]=COOKIE;
    if(type===shaka.net.NetworkingEngine.RequestType.MANIFEST || type===shaka.net.NetworkingEngine.RequestType.SEGMENT){
      if(!request.uris[0].includes("__hdnea__=")){
        request.uris[0] += (request.uris[0].includes("?") ? "&" : "?") + COOKIE;
      }
    }
  });

  const ui = new shaka.ui.Overlay(player, document.querySelector(".shaka-video-container"), video);
  ui.configure({controlPanelElements:["play_pause","time_and_duration","mute","volume","spacer","quality","fullscreen"]});

  try {
    await player.load(ch.url);
    video.play();
  } catch(e) {
    showError("Stream failed");
  }

  function showError(msg){
    const e=document.getElementById("errorMsg");
    e.innerText = msg;
    e.style.display = "block";
  }

});
</script>

</script>
