<style>

html,body{

}

.shaka-video-container{
position:absolute;
inset:0;

height:100%;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

#errorMsg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:rgba(255,0,0,0.35);

border-radius:8px;

}

#wm{

right:12px;
z-index:1000;

border:1px solid rgba(0,136,204,.3);
padding:6px 12px;
border-radius:8px;
font-size:12px;
font-weight:700;
color:#fff;
text-decoration:none;
}

</style>
</head>

<body>

function showError(msg){

}

if(!channels[tvgId]){
showError("Channel not found")
return
}

const ch=channels[tvgId]

document.title=ch.name+" - OffsideVerse Player"

const video=document.querySelector("video")
const player=new shaka.Player(video)

player.configure({
drm:{
clearKeys:{
[ch.keyId]:ch.key
}
}
})

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://www.jiotv.com/"
request.headers["User-Agent"]="plaYtv/7.1.3"

if(ch.cookie){
request.headers["Cookie"]=ch.cookie
}

})

const ui=new shaka.ui.Overlay(
player,
document.querySelector(".shaka-video-container"),
video
)

ui.configure({
controlPanelElements:[
"play_pause",
"time_and_duration",
"mute",
"volume",
"spacer",
"quality",
"fullscreen"
]
})

try{

await player.load(ch.url)
video.play()

}catch(e){

showError("Stream failed")

}

})
