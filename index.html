<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioTV Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
background:#000;
height:100vh;
width:100vw;
overflow:hidden;
font-family:system-ui,-apple-system,sans-serif;
}

.shaka-video-container{
position:absolute;
inset:0;
width:100%;
height:100%;
}

video{
width:100%;
height:100%;
background:#000;
object-fit:contain;
}

.shaka-spinner-container,
.shaka-spinner,
.shaka-spinner-svg{
display:none!important;
}

.error-message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
padding:20px;
background:rgba(255,0,0,0.3);
border-radius:8px;
display:none;
}

#wm{
position:fixed;
top:12px;
right:12px;
z-index:900;
display:flex;
align-items:center;
gap:6px;
background:rgba(0,136,204,.18);
backdrop-filter:blur(8px);
border:1px solid rgba(0,136,204,.28);
padding:6px 11px;
border-radius:7px;
color:#fff;
font-size:12px;
font-weight:700;
text-decoration:none;
}
</style>
</head>

<body>

<a href="https://t.me/+7VkflslOE9s4YjQ9" target="_blank" id="wm">
@OffsideVerse
</a>

<div class="shaka-video-container" data-shaka-player>
<video autoplay playsinline preload="metadata"></video>
</div>

<div class="error-message" id="errorMsg"></div>

<script>

document.addEventListener('DOMContentLoaded', async () => {

shaka.polyfill.installAll();

if (!shaka.Player.isBrowserSupported()){
showError("Browser not supported");
return;
}

const tvgId = new URLSearchParams(window.location.search).get("tvid");

if(!tvgId){
showError("Please provide tvid parameter (e.g., ?tvid=ss1hd)");
return;
}

const channels={

"ss1hd":{
name:"Star Sports 1 HD",
streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/output/index.mpd",
cookie:"__hdnea__=st=1772908177~exp=1772994577~acl=/*~hmac=a75d41857d35a2e4fbada2207e606ec1ff6cf3bd334da54d4e6bf5e5b60e85cd",
clearKey:{
keyId:"965dc2ddb1d85138ad787999a7f30ca5",
key:"859695076e67fe961836b564db6d689c"
}
},

"ss1hin":{
name:"Star Sports 1 Hindi",
streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/output/index.mpd",
cookie:"__hdnea__=st=1772908177~exp=1772994577~acl=/*~hmac=a75d41857d35a2e4fbada2207e606ec1ff6cf3bd334da54d4e6bf5e5b60e85cd",
clearKey:{
keyId:"400131994b445d8c8817202248760fda",
key:"2d56cb6f07a75b9aff165d534ae2bfc4"
}
}

};

function showError(message){
const errorDiv=document.getElementById("errorMsg");
errorDiv.textContent=message;
errorDiv.style.display="block";
}

if(!channels[tvgId]){
showError('Channel "'+tvgId+'" not found');
return;
}

const channelData=channels[tvgId];

document.title=channelData.name+" - JioTV Player";

const video=document.querySelector("video");
const player=new shaka.Player();

await player.attach(video);

const ui=new shaka.ui.Overlay(
player,
document.querySelector(".shaka-video-container"),
video
);

ui.configure({
controlPanelElements:[
"play_pause",
"time_and_duration",
"mute",
"volume",
"spacer",
"language",
"captions",
"picture_in_picture",
"quality",
"fullscreen"
]
});

player.configure({
drm:{
clearKeys:{
[channelData.clearKey.keyId]:channelData.clearKey.key
}
}
});

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://www.jiotv.com/";
request.headers["User-Agent"]="plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0";

if(channelData.cookie){
request.headers["Cookie"]=channelData.cookie;
}

if(
channelData.cookie &&
(type===shaka.net.NetworkingEngine.RequestType.MANIFEST ||
type===shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
request.uris[0] &&
!request.uris[0].includes("__hdnea__=")
){
const sep=request.uris[0].includes("?")?"&":"?";
request.uris[0]+=sep+channelData.cookie;
}

});

player.addEventListener("error",(event)=>{
console.error("Player error:",event.detail);
showError("Playback error: "+(event.detail.message||"Unknown error"));
});

try{
await player.load(channelData.streamUrl);
video.play();
}catch(e){
console.error("Load error:",e);
showError("Failed to load stream: "+e.message);
}

});

</script>

</body>
</html>
